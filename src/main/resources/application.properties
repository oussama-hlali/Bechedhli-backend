spring.application.name=bechedhli-solar

# PostgreSQL (Supabase Pooler)
# NOTE: If you set DB_URL as env var on Render, it must include &prepareThreshold=0
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.sdtpyzsauhkrreaulmom}
spring.datasource.password=${DB_PASSWORD:i9gdRmbQXKFQpkbY}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.prepared-statement-cache-size=0
spring.datasource.hikari.prepared-statement-cache-maximum-size=0

# Server
server.port=${PORT:9090}

# GraphQL
spring.graphql.path=/graphql
spring.graphql.graphiql.enabled=true